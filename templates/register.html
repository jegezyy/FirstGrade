{% extends 'base.html' %}

{% block title %}
Регистрация
{% endblock %}

{% block body %}
<div class="container" style="max-width: 400px; margin-top: 50px;">
    <h1>Регистрация</h1>
    {% if error %}
    <div class="alert alert-danger" style="white-space: pre-line;">{{ error }}</div>
    {% endif %}
    <form method="post">
        <input type="text" class="form-control" name="username" placeholder="Введите логин"><br>
        <input type="email" class="form-control" name="email" placeholder="Введите email"><br>
        <input type="password" class="form-control" name="password" placeholder="Введите пароль"><br>
        <input type="password" class="form-control" name="password2" placeholder="Повторите пароль"><br>
        <button class="btn btn-primary" type="submit">Зарегистрироваться</button>
    </form>
    <br>
    <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
{% endblock %}
